services:
  app:
    image: next-blog:local
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "${PORT:-3000}:3000"
    command: ["bun", "run", "dev"]

volumes:
  node_modules:
  next_cache:
