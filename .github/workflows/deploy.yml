name: Deploy static site

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Build app image
        run: docker compose build app

      - name: Lint
        run: docker compose run --rm app bun run lint

      - name: Test
        run: docker compose run --rm app bun run test

      - name: Build static site
        run: docker compose run --rm app bun run export

      - name: Smoke-test the built site
        run: docker compose run --rm app bun run smoke-test

      - name: Copy CNAME file
        run: docker compose run --rm app cp public/CNAME out/CNAME

      - name: Deploy to external repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.TOM_HANOLDT_INFO_PUBLISH_TOKEN }}
          external_repository: tomhanoldt/tomhanoldt.github.io
          publish_branch: main
          publish_dir: ./out
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
