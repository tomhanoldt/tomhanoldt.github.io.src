name: Security

on:
  push:
  pull_request:
  schedule:
    # Vulnerability databases update independently of our own commits, so
    # re-scan the already-pinned base image/dependencies weekly even when
    # nothing in the repo has changed.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  bun-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build app
      - run: docker compose run --rm app bun audit

  image-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build app
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "next-blog:local"
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-image.sarif"
          category: "trivy-image"

  config-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-config.sarif"
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-config.sarif"
          category: "trivy-config"

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, not just the latest commit
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "secret"
          format: "sarif"
          output: "trivy-secrets.sarif"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-secrets.sarif"
          category: "trivy-secrets"
