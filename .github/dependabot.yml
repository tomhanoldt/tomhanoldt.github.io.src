version: 2
updates:
  # package.json / bun.lock
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dockerfile's base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # Actions used by our own CI workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
